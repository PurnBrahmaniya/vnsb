backend:
  name: git-gateway
  branch: main

# MUST include "public/" so Astro can actually display the images online
media_folder: "public/assets/images"
public_folder: "/assets/images"

collections:
  - name: "pages"
    label: "Pages"
    files:
      - file: "index.html"
        label: "Home Page Settings"
        name: "home"
        fields:
          - { label: "Hero Title", name: "hero_title", widget: "string" }
          - { label: "Hero Subtitle", name: "hero_subtitle", widget: "text" }
  - name: "gallery"
    label: "Gallery Images"
    # MUST save to the exact folder Astro is going to look inside
    folder: "src/gallery-data"
    create: true
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - {
          label: "Category",
          name: "category",
          widget: "select",
          options: ["Events", "Workshops", "Sports", "Festivals"],
        }
      - { label: "Image", name: "image", widget: "image" }
